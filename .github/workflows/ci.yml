name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Install build deps
        run: sudo apt-get install -y mm-common libtool rake ruby imagemagick

      - name: Install emsdk
        run: |
          mkdir -p deps
          git clone https://github.com/emscripten-core/emsdk.git deps/emsdk
          cd deps/emsdk
          ./emsdk install latest
          ./emsdk activate latest

      # build.shのemsdk関連処理をホスト側で先に実行しておく
      - name: Pre-run emsdk source on host
        run: |
          source deps/emsdk/emsdk_env.sh
          # emsdkが要求する環境変数をGITHUB_ENVに書き出す
          echo "EMSDK=$EMSDK" >> $GITHUB_ENV
          echo "EMSDK_NODE=$EMSDK_NODE" >> $GITHUB_ENV
          echo "EM_CONFIG=$EM_CONFIG" >> $GITHUB_ENV
          # emscripten/nodeのバイナリパスを特定
          echo "EMSCRIPTEN_PATH=$EMSDK/upstream/emscripten" >> $GITHUB_ENV
          echo "EMSCRIPTEN_NODE_PATH=$(dirname $EMSDK_NODE)" >> $GITHUB_ENV

      - name: Build Docker image (Ubuntu 12.04 + depkit)
        run: |
          docker build \
            -f Dockerfile.ci \
            -t mkxp-web-build:ubuntu1204 \
            .

      - name: Build inside Ubuntu 12.04 container
        run: |
          # build.shのemsdkブロックをスキップするため deps/emsdk を既存扱いにする
          # （if [ ! -d "emsdk" ] の条件を満たしている → スキップ済み）
          # source emsdk/emsdk_env.sh の代わりにPATHと環境変数を直接注入する
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e EMSDK="/workspace/deps/emsdk" \
            -e EMSDK_NODE="/workspace/$(realpath --relative-to=${{ github.workspace }} $EMSDK_NODE)" \
            -e EM_CONFIG="$EM_CONFIG" \
            -e EM_CACHE="/workspace/deps/emsdk/upstream/emscripten/cache" \
            --env PATH="/workspace/deps/emsdk/upstream/emscripten:$EMSCRIPTEN_NODE_PATH:/opt/depkit/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
            mkxp-web-build:ubuntu1204 \
            bash -c "
              # emsdk_env.shのsourceをスキップするためダミーで上書き
              mkdir -p deps/emsdk
              echo 'true' > deps/emsdk/emsdk_env.sh
              source /opt/mkxp-depkit/buildenv.sh
              ./build.sh
            "

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@releases/v3
        with:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          BRANCH: built
          FOLDER: build
