name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Install build deps
        run: sudo apt-get install -y mm-common libtool rake ruby imagemagick

      - name: Install depkit
        run: |
          wget -O /tmp/mkxp-depkit.tar.xz \
            "https://www.dropbox.com/s/mtp44ur367m2zts/mkxp-depkit.tar.xz?dl=1"
          tar -xf /tmp/mkxp-depkit.tar.xz -C $HOME
          $HOME/mkxp-depkit/setup_depkit.sh

      - name: Install emsdk
        run: |
          mkdir -p deps
          git clone https://github.com/emscripten-core/emsdk.git deps/emsdk
          cd deps/emsdk
          ./emsdk install latest
          ./emsdk activate latest

      - name: Prepare patched build_config.rb
        run: |
          cat > extra/build_config.rb << 'EOF'
          MRuby::Build.new do |conf|
              toolchain :gcc
              conf.gembox 'default'
          end

          MRuby::CrossBuild.new('wasm32-unknown-gnu') do |conf|
              toolchain :clang

              conf.gembox 'default'
              conf.gem :github => 'mattn/mruby-onig-regexp', :commit => '3c1a8c4', :canonical => true
              conf.gem :github => 'pulsejet/mruby-marshal'
              conf.gem :github => 'monochromegane/mruby-time-strftime'
              conf.gem :core => 'mruby-eval'

              conf.cc.command = 'emcc'
              conf.cc.flags = %W(-O3 -g0)
              conf.cxx.command = 'em++'
              conf.cxx.flags = %W(-O3 -g0 -std=c++14)

              conf.linker.command = 'emcc'
              conf.archiver.command = 'emar'
          end
          EOF

      - name: Download mruby and add presym.h shim
        run: |
          mkdir -p deps && cd deps
          wget https://github.com/mruby/mruby/archive/2.1.2.tar.gz -O mruby.tar.gz
          tar xf mruby.tar.gz && rm mruby.tar.gz
          mv mruby-* mruby
          # presym.hはmruby 3.xで追加されたヘッダー
          # mruby-onig-regexpが要求するため空のshimを追加
          touch mruby/include/mruby/presym.h

      - name: Build
        run: |
          source $HOME/mkxp-depkit/buildenv.sh
          ./build.sh

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@releases/v3
        with:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          BRANCH: built
          FOLDER: build
