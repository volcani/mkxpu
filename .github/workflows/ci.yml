name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Install build deps
        run: sudo apt-get install -y mm-common libtool rake ruby imagemagick

      - name: Install emsdk
        run: |
          mkdir -p deps
          git clone https://github.com/emscripten-core/emsdk.git deps/emsdk
          cd deps/emsdk
          ./emsdk install latest
          ./emsdk activate latest
          source ./emsdk_env.sh
          echo "EM_CONFIG=$EM_CONFIG" >> $GITHUB_ENV

      # ホスト側のpython3バイナリをdeps以下にコピーしてコンテナから使えるようにする
      - name: Copy python3 for container
        run: |
          mkdir -p deps/python3/bin
          cp $(which python3) deps/python3/bin/python3
          cp $(which python3) deps/python3/bin/python
          # 依存する共有ライブラリも収集
          ldd $(which python3) | grep -o '/[^ ]*' | xargs -I{} cp --parents {} deps/python3/ 2>/dev/null || true
          # python3の標準ライブラリもコピー
          PYVER=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          cp -r /usr/lib/python${PYVER} deps/python3/lib/ 2>/dev/null || true
          cp -r /usr/lib/python3 deps/python3/lib/ 2>/dev/null || true

      - name: Build Docker image (Ubuntu 12.04 + depkit)
        run: |
          docker build \
            -f Dockerfile.ci \
            -t mkxp-web-build:ubuntu1204 \
            .

      - name: Build inside Ubuntu 12.04 container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e EMSDK="/workspace/deps/emsdk" \
            -e EMSDK_NODE="/workspace/deps/emsdk/node/$(ls deps/emsdk/node)/bin/node" \
            -e EM_CONFIG="$EM_CONFIG" \
            -e PATH="/workspace/deps/python3/bin:/workspace/deps/emsdk/upstream/emscripten:/workspace/deps/emsdk/node/$(ls deps/emsdk/node)/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
            -e LD_LIBRARY_PATH="/workspace/deps/python3/lib/x86_64-linux-gnu:/workspace/deps/python3/lib" \
            mkxp-web-build:ubuntu1204 \
            "./build.sh"

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@releases/v3
        with:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          BRANCH: built
          FOLDER: build
