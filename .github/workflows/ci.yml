name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Install build deps
        run: sudo apt-get install -y mm-common libtool rake ruby imagemagick

      - name: Install emsdk
        run: |
          mkdir -p deps
          git clone https://github.com/emscripten-core/emsdk.git deps/emsdk
          cd deps/emsdk
          ./emsdk install latest
          ./emsdk activate latest
          source ./emsdk_env.sh
          echo "NODE_DIR=$(ls ${{ github.workspace }}/deps/emsdk/node)" >> $GITHUB_ENV

      - name: Patch build.sh to skip emsdk_env.sh sourcing
        run: |
          sed -i 's|source emsdk/emsdk_env.sh|echo "Skipping emsdk_env.sh (PATH already injected by Docker)"|' build.sh

      - name: Build Docker image (Ubuntu 12.04 + depkit)
        run: |
          docker build \
            -f Dockerfile.ci \
            -t mkxp-web-build:ubuntu1204 \
            .

      - name: Build inside Ubuntu 12.04 container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e EMSDK="/workspace/deps/emsdk" \
            -e EMSDK_NODE="/workspace/deps/emsdk/node/${{ env.NODE_DIR }}/bin/node" \
            -e EM_CONFIG="/workspace/deps/emsdk/.emscripten" \
            -e PATH="/workspace/deps/emsdk/upstream/emscripten:/workspace/deps/emsdk/node/${{ env.NODE_DIR }}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
            mkxp-web-build:ubuntu1204 \
            "./build.sh"

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@releases/v3
        with:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          BRANCH: built
          FOLDER: build
