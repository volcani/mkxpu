name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      # depkitのダウンロードを含むため重い→イメージをキャッシュ
      - name: Cache Docker image
        uses: actions/cache@v3
        with:
          path: /tmp/docker-cache
          key: ubuntu1204-depkit-${{ hashFiles('Dockerfile.ci') }}

      - name: Build Docker image (Ubuntu 12.04 + depkit)
        run: |
          if [ -f /tmp/docker-cache/image.tar ]; then
            docker load < /tmp/docker-cache/image.tar
          else
            docker build \
              -f Dockerfile.ci \
              -t mkxp-web-build:ubuntu1204 \
              .
            mkdir -p /tmp/docker-cache
            docker save mkxp-web-build:ubuntu1204 > /tmp/docker-cache/image.tar
          fi

      - name: Build inside Ubuntu 12.04 container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            mkxp-web-build:ubuntu1204 \
            "./build.sh"

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@releases/v3
        with:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          BRANCH: built
          FOLDER: build
